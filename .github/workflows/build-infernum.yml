name: 'Build Infernum with Pointer'
on: workflow_dispatch
jobs:
  build:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["rpi_pico"]'
      shield: '["infernum"]'
      custom_config: '["#define MIRYOKU_ALPHAS_QWERTY"]'
      kconfig: '["CONFIG_ZMK_POINTING=y"]'
      branches: '["zmkfirmware/zmk/v0.3-branch"]'
      modules: '["cairnm/zmk-keyboards-infernum/main"]'
